<!DOCTYPE html>
<html>
<head>
    <title>Book List</title>
</head>
<body>
    <h1>Books</h1>
    <form method="POST" action="/search">
        <input type="text" name="search" placeholder="Search by ID or Name">
        <button type="submit">Search</button>
    </form>
    <br>
    <a href="/add">Add Book</a>
    <table border="1" cellpadding="5">
        <tr>
            <th>ID</th><th>Name</th><th>Price</th><th>Author</th><th>Actions</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.bid }}</td>
            <td>{{ book.bname }}</td>
            <td>{{ book.price }}</td>
            <td>{{ book.author }}</td>
            <td>
                <a href="/edit/{{ book.bid }}">Edit</a> |
                <a href="/delete/{{ book.bid }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
